<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leco Petersen — Diretor de Fotografia</title>
<link rel="stylesheet" href="css/style.css?v=14">
</head>
<body>

<header class="nav" id="nav">
  <a href="#hero" class="nav__brand">LECO PETERSEN</a>
  <nav class="nav__links">
    <a href="#hero">Home</a>
    <a href="#trabalhos">Portfólio</a>
    <a href="#sobre">Sobre</a>
  </nav>
</header>

<section id="hero" class="hero">
  <div class="hero__video-wrap">
    <iframe
      id="heroVideo"
      class="hero__video"
      src="https://www.youtube.com/embed/nrDqX3kzIYQ?autoplay=1&mute=1&loop=1&playlist=nrDqX3kzIYQ&controls=0&showinfo=0&modestbranding=1&rel=0&playsinline=1&enablejsapi=1"
      title="Reel de abertura"
      frameborder="0"
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
  <button class="hero__som" id="botaoSom" aria-label="Ativar som">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 9v6h4l5 5V4L8 9H4z"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>
  </button>
  <button class="hero__fechar" id="fecharVideo" aria-label="Fechar vídeo" hidden>&times;</button>
</section>

<section id="creditosVideo" class="creditos-video" hidden>
  <div class="creditos-video__conteudo">
    <h2 id="creditosTitulo"></h2>
    <p id="creditosTexto"></p>
  </div>
</section>

<section id="trabalhos" class="trabalhos">
  <div class="trabalhos__conteudo">
    <div class="trabalhos__filtros" id="filtros">
      <button class="filtro is-ativo" data-filtro="filmes">Filmes</button>
      <button class="filtro" data-filtro="videoclipes">Videoclipes</button>
      <button class="filtro" data-filtro="corporativos">Corporativos</button>
      <button class="filtro" data-filtro="pessoais">Pessoais</button>
    </div>

    <div class="trabalhos__grid" id="grid"></div>

    <p class="trabalhos__vazio" id="vazio" hidden>Em breve novos trabalhos nesta categoria.</p>

    <button class="btn-ver-mais" id="verMais" hidden>Ver mais</button>
  </div>
</section>

<section id="sobre" class="sobre">
  <div class="sobre__conteudo">
    <div class="sobre__foto">
      <img src="assets/foto-sobre.jpg" alt="Leco Petersen">
    </div>
    <div class="sobre__texto">
      <p id="sobre-texto"></p>
